<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frost - Focus</title>

<!-- Premium Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba') no-repeat center/cover;
  color: white;
}
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: -1;
}

.top-bar {
  position: sticky;
  top: 0;
  padding-top: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(12px);
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 20px;
  padding: 15px 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 14px;
}

nav a { color: #ccc; margin-left: 20px; text-decoration: none; transition: 0.3s; }
nav a:visited { color: #ccc; }
nav a:hover { color: white; }

.hero {
  text-align: center;
  margin-top: 60px;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  letter-spacing: 5px;
  margin: 0;
}
.hero p { margin-top: 10px; color: #ccc; letter-spacing: 2px; }

.glass {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  max-width: 400px;
  margin: 20px auto;
}

#timerDisplay {
  font-size: 48px;
  margin: 20px 0;
  letter-spacing: 3px;
}

input[type="number"] {
  width: 50%;
  padding: 8px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  text-align: center;
}

button {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { background: rgba(255,255,255,0.2); }

footer {
  text-align: center;
  margin: 30px 20px;
  padding: 20px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}
footer h2 { font-family: 'Playfair Display', serif; margin: 0; letter-spacing: 3px; }
footer p { margin: 5px 0; color: #ccc; font-size: 14px; }

@media screen and (max-width: 768px) {
  .hero h1 { font-size: 50px; letter-spacing: 3px; }
  .hero p { font-size: 14px; }
  .glass { max-width: 90%; padding: 15px; }
  button { width: 100%; margin: 5px 0; }
  input[type="number"] { width: 80%; }
  footer h2 { font-size: 20px; }
  footer p { font-size: 12px; }
}

@media screen and (max-width: 480px) {
  .hero h1 { font-size: 40px; }
  .hero p { font-size: 12px; }
  .glass { padding: 10px; }
}
</style>
</head>

<body>
<header class="top-bar">
  <nav>
    <div>FROST</div>
    <div>
      <a href="index.html">Home</a>
      <a href="tasks.html">Tasks</a>
      <a href="focus.html">Focus</a>
      <a href="stats.html">Stats</a>
    </div>
  </nav>
</header>

<div class="hero">
  <h1>FOCUS</h1>
  <p>STUDY PRODUCTIVITY HUB</p>
  <p>Track your focus sessions</p>
</div>

<div class="glass">
  <h3>Focus Timer</h3>
  <input id="focusMinutes" type="number" min="1" max="180" placeholder="Minutes">
  <div id="timerDisplay">25:00</div>
  <button id="startBtn">Start</button>
  <button id="pauseBtn">Pause</button>
  <p>Completed Sessions: <span id="sessions">0</span></p>
</div>

<footer>
  <h2>FROST</h2>
  <p>STUDY PRODUCTIVITY HUB</p>
  <p>All rights reserved @2026</p>
</footer>

<script src="script.js"></script>

</body>
</html>
